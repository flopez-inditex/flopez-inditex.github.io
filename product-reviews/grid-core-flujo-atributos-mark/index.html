<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid-Core · Flujo de Atributos MARK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<style>
  :root {
    --bg-primary: #1a1a1a;
    --surface: rgba(255,255,255,0.03);
    --surface-hover: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.18);
    --text-primary: #ffffff;
    --text-secondary: rgba(255,255,255,0.6);
    --text-tertiary: rgba(255,255,255,0.35);
    --accent-blue: #007AFF;
    --accent-green: #34C759;
    --accent-orange: #FF9500;
    --accent-cyan: #5AC8FA;
    --accent-purple: #BF5AF2;
    --accent-yellow: #FFD60A;
    --accent-red: #FF3B30;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.5;
    font-weight: 400;
    letter-spacing: -0.02em;
    overflow-x: hidden;
    min-height: 100vh;
  }

  .noise {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 1000; opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .page-wrapper { max-width: 960px; margin: 0 auto; padding: 60px 40px 80px; }
  @media (max-width: 768px) { .page-wrapper { padding: 40px 20px 60px; } }

  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-tertiary); }

  .reveal { opacity: 1; }

  /* ─── HEADER ─── */
  .page-header { margin-bottom: 48px; }
  .page-header h1 { font-size: clamp(28px, 4vw, 48px); font-weight: 600; letter-spacing: -0.025em; line-height: 1.08; margin: 12px 0 10px; }
  .page-header p { font-size: 15px; color: var(--text-secondary); max-width: 620px; line-height: 1.6; }

  /* ─── SECTION BLOCK ─── */
  .section-block {
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    padding: 30px 32px;
    margin-bottom: 24px;
    transition: border-color 0.3s, background 0.3s;
  }
  .section-block:hover { background: var(--surface-hover); border-color: var(--border-strong); }

  .section-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 22px; }
  .section-accent { width: 3px; border-radius: 2px; min-height: 36px; flex-shrink: 0; }
  .section-title { font-size: 17px; font-weight: 600; letter-spacing: -0.021em; margin-bottom: 4px; }
  .section-desc { font-size: 13px; color: var(--text-tertiary); line-height: 1.5; }

  /* ─── CONTENT LEAD ─── */
  .content-lead {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.75;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  /* ─── ISSUE / PREMISE CARDS ─── */
  .issue-list { display: flex; flex-direction: column; gap: 14px; }

  .issue-card {
    border-radius: 14px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    padding: 18px 20px;
    transition: border-color 0.25s, background 0.25s;
  }
  .issue-card:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.13); }

  .issue-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .issue-icon { font-size: 15px; flex-shrink: 0; }
  .issue-title { font-size: 14px; font-weight: 600; letter-spacing: -0.015em; }
  .issue-body { font-size: 12px; color: var(--text-secondary); line-height: 1.65; }

  /* ─── EXAMPLE LIST ─── */
  .example-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .example-item {
    display: flex; gap: 10px; padding: 10px 14px;
    border-radius: 10px; background: rgba(255,255,255,0.018);
    border-left: 2px solid rgba(0,122,255,0.35);
  }
  .example-bullet { color: var(--accent-blue); font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
  .example-text { font-size: 12px; color: var(--text-tertiary); line-height: 1.6; }
  .example-text strong { color: rgba(255,255,255,0.55); font-weight: 600; }

  /* ─── CONFLICT TABLE ─── */
  .conflict-table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
  .conflict-table { width: 100%; border-collapse: collapse; font-size: 12px; line-height: 1.6; }
  .conflict-table thead tr { border-bottom: 1px solid rgba(90,200,250,0.2); }
  .conflict-table th {
    padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase; color: var(--accent-cyan);
    background: rgba(90,200,250,0.04); white-space: nowrap;
  }
  .conflict-table td { padding: 13px 16px; color: var(--text-secondary); vertical-align: top; border-top: 1px solid var(--border); }
  .conflict-table tbody tr:hover td { background: rgba(255,255,255,0.02); }
  .conflict-table tbody tr.empty-row td {
    height: 44px; border-top: 1px dashed rgba(255,255,255,0.05);
    color: var(--text-tertiary); font-size: 12px; text-align: center; letter-spacing: 0.1em;
  }
  .conflict-tag {
    display: inline-block; padding: 3px 9px; border-radius: 8px;
    background: rgba(90,200,250,0.1); border: 1px solid rgba(90,200,250,0.2);
    color: var(--accent-cyan); font-size: 11px; font-weight: 600; white-space: nowrap;
  }

  /* ─── PREMISE GROUPS ─── */
  .premise-group { display: flex; flex-direction: column; gap: 12px; }
  .premise-group-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-tertiary); padding-left: 2px;
  }
  .premise-section-divider { border: none; border-top: 1px solid var(--border); margin: 22px 0; }

  /* ─── HORIZONTAL TIMELINE ─── */
  .timeline-wrap {
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.08) transparent;
  }
  .timeline-wrap::-webkit-scrollbar { height: 4px; }
  .timeline-wrap::-webkit-scrollbar-track { background: transparent; }
  .timeline-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  .timeline {
    display: flex;
    gap: 10px;
    min-width: 600px;
    position: relative;
    padding-top: 4px;
  }

  .timeline::before {
    content: '';
    position: absolute;
    top: 24px;
    left: 24px;
    right: 24px;
    height: 1px;
    background: linear-gradient(
      to right,
      rgba(52,199,89,0.7) 0%,
      rgba(52,199,89,0.5) 33%,
      rgba(52,199,89,0.25) 66%,
      rgba(52,199,89,0.08) 100%
    );
    z-index: 0;
  }

  .timeline-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .timeline-node {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(52,199,89,0.08);
    border: 1.5px solid rgba(52,199,89,0.3);
    color: var(--accent-green);
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
    flex-shrink: 0;
    transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
  }
  .timeline-item:hover .timeline-node {
    background: rgba(52,199,89,0.16);
    border-color: rgba(52,199,89,0.65);
    box-shadow: 0 0 18px rgba(52,199,89,0.22), 0 0 6px rgba(52,199,89,0.15);
  }

  .timeline-stem {
    width: 1px;
    height: 14px;
    background: linear-gradient(to bottom, rgba(52,199,89,0.3), rgba(52,199,89,0.05));
    flex-shrink: 0;
  }

  .timeline-card {
    width: 100%;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    padding: 14px 14px 16px;
    text-align: center;
    transition: border-color 0.3s, background 0.3s, transform 0.3s, box-shadow 0.3s;
  }
  .timeline-item:hover .timeline-card {
    background: rgba(255,255,255,0.04);
    border-color: rgba(52,199,89,0.18);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }

  .timeline-phase {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent-green);
    opacity: 0.7;
    margin-bottom: 6px;
  }

  .timeline-card-text {
    font-size: 11.5px;
    color: var(--text-secondary);
    line-height: 1.65;
  }

  /* ─── PILLS ─── */
  .pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.02em; white-space: nowrap; }
  .pill-green  { background: rgba(52,199,89,0.15);  color: #34C759; border: 1px solid rgba(52,199,89,0.2); }
  .pill-orange { background: rgba(255,149,0,0.15);  color: #FF9500; border: 1px solid rgba(255,149,0,0.2); }
  .pill-red    { background: rgba(255,59,48,0.15);  color: #FF3B30; border: 1px solid rgba(255,59,48,0.2); }
  .pill-blue   { background: rgba(0,122,255,0.15);  color: #007AFF; border: 1px solid rgba(0,122,255,0.2); }
  .pill-cyan   { background: rgba(90,200,250,0.15); color: #5AC8FA; border: 1px solid rgba(90,200,250,0.2); }
  .pill-purple { background: rgba(191,90,242,0.15); color: #BF5AF2; border: 1px solid rgba(191,90,242,0.2); }
  .pill-yellow { background: rgba(255,214,10,0.15); color: #FFD60A; border: 1px solid rgba(255,214,10,0.2); }
  .pill-grey   { background: rgba(255,255,255,0.06); color: var(--text-tertiary); border: 1px solid var(--border); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 40px 0 32px; }
</style>
</head>
<body>
<div class="noise"></div>
<div class="page-wrapper">

  <!-- ══ PAGE HEADER ══ -->
  <div class="page-header reveal">
    <p class="label">Grid-Core · Product Review</p>
    <h1>Flujo de Atributos MARK</h1>
  </div>

  <!-- ══ SECCIÓN PLACEHOLDER ══ -->
  <div class="section-block reveal">
    <div class="section-header">
      <div class="section-accent" style="background:var(--accent-blue)"></div>
      <div>
        <div class="section-title">Contenido pendiente</div>
        <div class="section-desc">Las secciones de este documento están por definir</div>
      </div>
    </div>
    <p class="content-lead">Este documento está pendiente de redacción. Añade las secciones cuando tengas el contenido listo.</p>
  </div>

  <!-- FOOTER -->
  <div style="text-align:center;padding-top:40px;border-top:1px solid var(--border)">
    <p style="font-size:12px;color:var(--text-tertiary)">Grid-Core · Product Review &middot; <a href="/product-reviews/" style="color:var(--text-tertiary);text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.1);">Volver a Product Reviews</a></p>
  </div>

</div>

<script>
  gsap.registerPlugin(ScrollTrigger);

  gsap.fromTo('.page-header', { opacity:0, y:20 }, { opacity:1, y:0, duration:0.8, ease:'power3.out' });

  document.querySelectorAll('.reveal').forEach((el, i) => {
    gsap.fromTo(el,
      { opacity: 0, y: 24 },
      { opacity: 1, y: 0, duration: 0.7, ease: 'power3.out',
        scrollTrigger: { trigger: el, start: 'top 92%', toggleActions: 'play none none reverse' },
        delay: 0.04 * (i % 4)
      }
    );
  });
</script>
</body>
</html>
